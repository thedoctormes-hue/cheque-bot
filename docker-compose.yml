version: "3.8"

services:
  cheque-bot:
    build: .
    container_name: cheque-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - bot-data:/app/data
      - bot-logs:/app/logs
    environment:
      - DB_PATH=/app/data/cheques.db
      - LOG_PATH=/app/logs/cheque-bot.log
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if os.path.exists('/app/main.py') else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-data:
  bot-logs:
